<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKFUM V1.0 | AtmosferinKalbi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --cyan: #00d2ff;
            --deep-blue: #001524;
            --glass-blue: rgba(0, 150, 255, 0.15);
            --glass-border: rgba(0, 210, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Arka Plan: Maviden Koyu Maviye Gradyan */
        body, html { 
            height: 100%; 
            background: linear-gradient(135deg, #003a4d 0%, #001524 100%); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }

        header {
            height: 60px;
            background: rgba(0, 21, 36, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--glass-border);
            z-index: 1001;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--cyan); letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,210,255,0.5); }

        main { display: flex; height: calc(100% - 60px); width: 100%; }

        /* Yan Panel Cam Efekti */
        #sidebar {
            width: 320px;
            background: var(--glass-blue);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 20px;
            z-index: 1000;
            overflow-y: auto;
        }

        /* Cam Efektli Kutular */
        .card {
            background: rgba(0, 40, 80, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { color: var(--cyan); margin-bottom: 12px; font-size: 1.1rem; font-weight: 600; }
        .val { color: #00ffcc; font-weight: bold; }

        /* Harita */
        #map { flex: 1; height: 100%; background: transparent; }

        /* Şimşek İkonu */
        .thunder-icon {
            font-size: 28px;
            animation: thunder-blink 0.8s infinite;
            filter: drop-shadow(0 0 8px yellow);
        }

        @keyframes thunder-blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            main { flex-direction: column; }
            #sidebar { width: 100%; height: auto; order: 2; border-right: none; border-top: 1px solid var(--glass-border); }
            #map { order: 1; flex: 1.5; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">AKFUM V1.0</div>
    <div style="font-size: 0.8rem; color: #ffcc00; font-weight: bold;">ORAJ RADARI</div>
</header>

<main>
    <section id="sidebar">
        <div class="card">
            <h2>Hava Durumu</h2>
            <div id="weather-info">Yükleniyor...</div>
        </div>

        <div class="card">
            <h2>Risk Analizi</h2>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>CAPE:</span> <span class="val">1850 J/kg</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>Yıldırım:</span> <span class="val">KRİTİK</span>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span>Sınır:</span> <span style="color:orange; font-weight:bold;">TURUNCU</span>
            </div>
        </div>

        <div style="font-size: 0.7rem; color: rgba(255,255,255,0.5); text-align: center;">
            AtmosferinKalbi © 2026
        </div>
    </section>

    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const API_KEY = 'b879d5326e5ae3f4e4f79a0ef03c0394';
    
    // Harita Başlatma
    var map = L.map('map', {zoomControl: false}).setView([41.0, 28.9], 8);

    // Koyu Tema Harita Katmanı
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Yağış Radarı
    L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${API_KEY}`, {
        opacity: 0.5
    }).addTo(map);

    // İstanbul Sınırı (Turuncu Risk Hattı)
    L.circle([41.0082, 28.9784], {
        color: '#ff8c00',
        fillColor: '#ff8c00',
        fillOpacity: 0.1,
        weight: 3,
        radius: 45000
    }).addTo(map);

    // Yanıp Sönen Şimşek İkonu
    var thunderIcon = L.divIcon({
        className: 'custom-icon',
        html: "<div class='thunder-icon'>⚡</div>",
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });
    L.marker([41.0082, 28.9784], {icon: thunderIcon}).addTo(map).bindPopup("<b>İstanbul:</b> Şiddetli Oraj!");

    // Hava Durumu Verisi Çekme
    async function getWeatherData() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Istanbul&appid=${API_KEY}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod === 200) {
                document.getElementById('weather-info').innerHTML = `
                    <p>Sıcaklık: <span class="val">${Math.round(data.main.temp)}°C</span></p>
                    <p>Nem: <span class="val">%${data.main.humidity}</span></p>
                    <p>Durum: <span class="val">${data.weather[0].description}</span></p>
                `;
            }
        } catch(e) { console.log("Veri hatası"); }
    }
    getWeatherData();
</script>

</body>
</html>
