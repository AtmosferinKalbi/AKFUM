<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKFUM V1.0 | AtmosferinKalbi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --cyan: #00d2ff;
            --dark: #0b0e14;
            --glass: rgba(0, 210, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Üst Başlık */
        header {
            height: 60px;
            background: #001524;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--cyan);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1001;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--cyan); letter-spacing: 2px; }

        /* Ana Ekran Düzeni */
        main {
            display: flex;
            height: calc(100% - 60px);
            width: 100%;
        }

        /* Yan Panel (Şeffaf Turkuaz) */
        #sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px;
            overflow-y: auto;
            z-index: 1000;
        }

        /* Harita Alanı */
        #map { flex: 1; height: 100%; background: #000; }

        .card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h2 { color: var(--cyan); margin-bottom: 10px; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .val { color: #00ffcc; font-weight: bold; }

        /* Mobil Ayarı */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            #sidebar { width: 100%; height: auto; order: 2; border-right: none; border-top: 1px solid var(--cyan); }
            #map { order: 1; flex: 1.5; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">AKFUM V1.0</div>
    <div style="font-size: 0.8rem; color: #aaa;">Fırtına Uyarı Merkezi</div>
</header>

<main>
    <section id="sidebar">
        <div class="card">
            <h2>Canlı Veri (İstanbul)</h2>
            <div id="weather-data">
                <p>Veriler yükleniyor...</p>
            </div>
        </div>

        <div class="card">
            <h2>Oraj Tahmin Parametreleri</h2>
            <div class="data-row"><span>Tahmini CAPE:</span> <span class="val">1450 J/kg</span></div>
            <div class="data-row"><span>Lifted Index:</span> <span class="val">-4.2</span></div>
            <div class="data-row"><span>Yıldırım Riski:</span> <span class="val">%75</span></div>
        </div>

        <div style="font-size: 0.75rem; color: #888; text-align: center;">
            © AtmosferinKalbi | Veriler OpenWeatherMap üzerinden çekilmektedir.
        </div>
    </section>

    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // --- YAPILANDIRMA ---
    const API_KEY = 'b879d5326e5ae3f4e4f79a0ef03c0394';
    const SEHIR = 'Istanbul';

    // 1. Haritayı Başlat
    var map = L.map('map').setView([41.0, 29.0], 7);

    // 2. Koyu Tema Katmanı (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: 'AKFUM'
    }).addTo(map);

    // 3. Canlı Yağış Radarı Katmanı (OpenWeatherMap)
    L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${API_KEY}`, {
        opacity: 0.6
    }).addTo(map);

    // 4. API ile Hava Durumu Çekme
    async function updateWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${SEHIR}&appid=${API_KEY}&units=metric&lang=tr`);
            const data = await res.json();

            if (data.cod === 200) {
                const weatherHTML = `
                    <div class="data-row"><span>Sıcaklık:</span> <span class="val">${Math.round(data.main.temp)}°C</span></div>
                    <div class="data-row"><span>Nem:</span> <span class="val">%${data.main.humidity}</span></div>
                    <div class="data-row"><span>Rüzgar:</span> <span class="val">${data.wind.speed} m/s</span></div>
                    <div class="data-row"><span>Durum:</span> <span class="val">${data.weather[0].description.toUpperCase()}</span></div>
                `;
                document.getElementById('weather-data').innerHTML = weatherHTML;

                // Haritaya konum işareti ekle
                L.marker([data.coord.lat, data.coord.lon])
                    .addTo(map)
                    .bindPopup(`<b>${data.name}</b><br>Oraj Potansiyeli Analiz Ediliyor.`)
                    .openPopup();
            }
        } catch (err) {
            document.getElementById('weather-data').innerHTML = "<p style='color:red'>Hata: Veri alınamadı.</p>";
        }
    }

    // Başlat
    updateWeather();
</script>

</body>
</html>
