<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKFUM V1.0 | İstanbul Oraj Takibi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --cyan: #00d2ff;
            --warning: #ff8c00;
            --glass: rgba(0, 150, 255, 0.15);
            --border: rgba(0, 210, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Koyu Mavi Gradyan Arka Plan */
        body, html { 
            height: 100%; 
            background: linear-gradient(135deg, #001f3f 0%, #000a12 100%); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }

        header {
            height: 60px;
            background: rgba(0, 10, 18, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            z-index: 1001;
        }

        main { display: flex; height: calc(100% - 60px); width: 100%; }

        /* Cam Efektli Yan Panel */
        #sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--border);
            padding: 20px;
            z-index: 1000;
            overflow-y: auto;
        }

        /* Mavi Cam Efektli Kutular */
        .card {
            background: rgba(0, 50, 100, 0.3);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #map { flex: 1; height: 100%; background: #000; }

        /* Şimşek İkonu Animasyonu */
        .thunder-icon {
            font-size: 32px;
            animation: flash 0.8s infinite;
            filter: drop-shadow(0 0 10px #ffee00);
        }

        @keyframes flash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        @media (max-width: 768px) {
            main { flex-direction: column; }
            #sidebar { width: 100%; height: auto; order: 2; border-right: none; }
            #map { order: 1; flex: 1.5; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--cyan); letter-spacing:2px;">AKFUM V1.0</div>
</header>

<main>
    <section id="sidebar">
        <div class="card">
            <h2 style="color:var(--cyan); font-size:1.1rem; margin-bottom:10px;">İstanbul Analizi</h2>
            <div id="weather">Yükleniyor...</div>
        </div>

        <div class="card">
            <h2 style="color:var(--warning); font-size:1.1rem; margin-bottom:10px;">Oraj Uyarısı</h2>
            <p style="font-size:0.9rem;">İl sınırları içerisinde <b style="color:var(--warning);">Turuncu Alarm</b> verilmiştir. Konvektif aktivite takibi yapılmaktadır.</p>
        </div>
    </section>

    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const API_KEY = 'b879d5326e5ae3f4e4f79a0ef03c0394';
    
    // Haritayı İstanbul Odaklı Başlat
    var map = L.map('map', {zoomControl: false}).setView([41.1, 28.9], 9);

    // Koyu Tema
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 1. İSTANBUL İL SINIRI (Basitleştirilmiş GeoJSON Sınırı)
    var istanbulBorder = [
        [41.51, 28.08], [41.58, 28.31], [41.45, 28.62], [41.32, 29.05], 
        [41.28, 29.45], [41.20, 29.85], [41.10, 29.95], [40.95, 29.35], 
        [40.80, 29.20], [40.90, 28.60], [41.00, 28.10], [41.15, 27.90]
    ];

    L.polygon(istanbulBorder, {
        color: '#ff8c00',      // Turuncu Sınır
        fillColor: '#ff8c00',
        fillOpacity: 0.05,     // Daha şeffaf iç dolgu
        weight: 1              // İNCE SINIR (weight: 1)
    }).addTo(map);

    // 2. ŞİMŞEK İKONU (Tam Merkezde)
    var thunderIcon = L.divIcon({
        className: 'custom-icon',
        html: "<div class='thunder-icon'>⚡</div>",
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });
    L.marker([41.1, 28.9], {icon: thunderIcon}).addTo(map);

    // 3. YAĞIŞ RADARI
    L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${API_KEY}`, {
        opacity: 0.5
    }).addTo(map);

    // Hava Durumu Çek
    async function getLiveWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Istanbul&appid=${API_KEY}&units=metric&lang=tr`);
            const data = await res.json();
            document.getElementById('weather').innerHTML = `
                <p>Sıcaklık: <span style="color:#00ffcc; font-weight:bold;">${Math.round(data.main.temp)}°C</span></p>
                <p>Nem: <span style="color:#00ffcc; font-weight:bold;">%${data.main.humidity}</span></p>
                <p>Rüzgar: <span style="color:#00ffcc; font-weight:bold;">${data.wind.speed} m/s</span></p>
            `;
        } catch(e) { console.log("Hata!"); }
    }
    getLiveWeather();
</script>

</body>
</html>
