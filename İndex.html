<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKFUM | Fırtına Uyarı Merkezi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-blue: #00d2ff;
            --glass-bg: rgba(0, 210, 255, 0.1);
            --border-color: rgba(0, 210, 255, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Alanı */
        header {
            padding: 15px 25px;
            background: linear-gradient(90deg, #001524 0%, #00d2ff 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo { font-weight: bold; font-size: 24px; letter-spacing: 2px; }

        /* Ana İçerik */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Yan Panel (Şeffaf Turkuaz) */
        #sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .risk-high { color: #ff4d4d; font-weight: bold; }

        /* Harita Alanı */
        #map {
            width: 100%;
            height: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .btn-update {
            background: var(--accent-blue);
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">AKFUM V1.0</div>
    <div id="status">Sistem Aktif: Oraj Takibi Yapılıyor</div>
</header>

<main>
    <section id="sidebar">
        <h2>Fırtına Verileri</h2>
        <div class="card">
            <h3>Anlık Durum</h3>
            <table>
                <tr><td>Parametre</td><td>Değer</td></tr>
                <tr><td>Konvektif Durum</td><td class="risk-high">KRİTİK</td></tr>
                <tr><td>Tahmini CAPE</td><td id="cape-val">Yükleniyor...</td></tr>
                <tr><td>Yıldırım Riski</td><td>%85</td></tr>
            </table>
        </div>

        <div class="card">
            <h3>Bölgesel Uyarılar</h3>
            <p style="font-size: 0.9em;">Karadeniz ve Marmara hattında süper hücre oluşumu gözlemlenebilir.</p>
        </div>

        <button class="btn-update" onclick="fetchWeatherData()">Verileri Güncelle</button>
    </section>

    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Harita Kurulumu (Türkiye merkezli)
    const map = L.map('map').setView([39.0, 35.0], 6);

    // Koyu Tema Harita Katmanı (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: 'AKFUM | AtmosferinKalbi'
    }).addTo(map);

    // 2. API Veri Çekme Fonksiyonu
    async function fetchWeatherData() {
        const apiKey = 'BURAYA_API_KEY_GELECEK'; // OpenWeatherMap'ten ücretsiz key almalısın
        const city = 'Istanbul'; 
        
        try {
            // Örnek API Çağrısı (Sıcaklık ve genel hava durumu için)
            // Not: CAPE verisi genellikle ücretli veya özel modellerde (GFS/ECMWF) bulunur.
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
            const data = await response.json();
            
            // Veriyi ekrana basma (Örnek olarak CAPE kısmına sıcaklığı yazdıralım)
            document.getElementById('cape-val').innerText = data.main.temp + " °C";
            
            // Haritaya sembolik bir fırtına ikonu ekleme
            L.marker([41.0, 29.0]).addTo(map)
                .bindPopup("Oraj Riski: Yüksek (İstanbul)")
                .openPopup();
                
        } catch (error) {
            console.log("Veri çekilemedi, lütfen API anahtarınızı kontrol edin.");
            document.getElementById('cape-val').innerText = "1850 J/kg"; // Örnek statik veri
        }
    }

    // Sayfa açıldığında veriyi çek
    fetchWeatherData();
</script>

</body>
</html>
