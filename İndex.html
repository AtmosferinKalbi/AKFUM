<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKFUM | Fırtına Uyarı Merkezi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Sayfa yapısı */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Üst Menü */
        header {
            height: 50px;
            background: #001524;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid #00d2ff;
            font-weight: bold;
            letter-spacing: 2px;
            color: #00d2ff;
        }

        /* Ana Gövde */
        #container {
            display: flex;
            height: calc(100% - 50px);
            width: 100%;
        }

        /* Yan Panel */
        #sidebar {
            width: 300px;
            background: rgba(0, 210, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        /* Harita - Beyaz ekranı önlemek için height 100% şart */
        #map {
            flex: 1;
            height: 100%;
            background: #000;
        }

        .card {
            background: rgba(0,0,0,0.6);
            border: 1px solid #00d2ff55;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        h2 { color: #00d2ff; font-size: 1.2rem; margin-top: 0; }
        .data { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<header>AKFUM V1.0 | AtmosferinKalbi</header>

<div id="container">
    <div id="sidebar">
        <h2>Oraj Verileri</h2>
        <div class="card">
            <p>Durum: <span style="color: #00ff00;">Sistem Aktif</span></p>
            <p>CAPE: <span class="data">1650 J/kg</span></p>
            <p>LI: <span class="data">-5</span></p>
        </div>
        <div class="card">
            <p style="font-size: 0.9rem;">Harita üzerinde güncel oraj ve yıldırım risklerini takip edebilirsiniz.</p>
        </div>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Sayfa yüklendiğinde çalışacak fonksiyon
    window.onload = function() {
        try {
            // Haritayı oluştur (Türkiye merkezli)
            var map = L.map('map').setView([39.0, 35.0], 6);

            // Koyu Tema Harita Katmanı (CartoDB Dark)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: 'AKFUM'
            }).addTo(map);

            // Örnek bir risk noktası ekle (Ankara)
            L.circle([39.9, 32.8], {
                color: 'cyan',
                fillColor: '#00d2ff',
                fillOpacity: 0.5,
                radius: 30000
            }).addTo(map).bindPopup('Oraj Gelişimi Bekleniyor');

            console.log("Harita başarıyla yüklendi!");
        } catch (error) {
            console.error("Hata oluştu:", error);
            document.body.innerHTML += '<div style="position:absolute; top:60px; left:320px; color:red;">Harita yüklenemedi: ' + error + '</div>';
        }
    };
</script>

</body>
</html>
